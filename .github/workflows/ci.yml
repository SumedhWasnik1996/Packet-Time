name: CI — Test

# ─────────────────────────────────────────────────────────────────────────────
# Runs on every push to main/dev and on every pull request.
# Tests must pass before a release tag build is triggered.
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main
      - dev
    # Don't run CI on tag pushes — the release workflow handles those
    tags-ignore:
      - 'v*'
  pull_request:
    branches:
      - main
      - dev

env:
  NODE_VERSION: '20'
  APP_DIR: packetTimeApp

jobs:

  # ── Run the full test suite ──────────────────────────────────────────────
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    # Test against two Node versions to catch compatibility issues
    strategy:
      matrix:
        node-version: ['18', '20']
      fail-fast: false

    defaults:
      run:
        working-directory: ${{ env.APP_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: ${{ env.APP_DIR }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Write a minimal .env so dotenv doesn't warn about missing file
      - name: Write test .env
        run: |
          echo "NODE_ENV=test" > .env
          echo "OPEN_DEVTOOLS=false" >> .env

      - name: Run tests with coverage
        run: npm run test:ci
        env:
          NODE_ENV: test

      - name: Upload coverage report
        if: matrix.node-version == '20'   # only upload once
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ${{ env.APP_DIR }}/coverage/
          retention-days: 14

  # ── Summary — makes it easy to require "CI" as a branch protection rule ──
  ci-passed:
    name: CI Passed
    runs-on: ubuntu-latest
    needs: test
    if: always()
    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "Tests failed — blocking merge"
            exit 1
          fi
          echo "All tests passed ✓"
