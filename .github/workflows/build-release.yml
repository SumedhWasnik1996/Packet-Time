name: Build & Release

# Triggers on a version tag: git tag v1.0.0 && git push --tags
on:
  push:
    tags:
      - 'v*.*.*'
  # Also allow manual trigger from the Actions tab
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — build but do not publish release'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

env:
  NODE_VERSION: '20'
  APP_DIR: packetTimeApp

jobs:
  # ── 1. Validate environment ─────────────────────────────────
  validate:
    name: Validate Environment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Check Node version
        run: node --version && npm --version

      - name: Validate package.json
        working-directory: ${{ env.APP_DIR }}
        run: node -e "const p = require('./package.json'); console.log('✓ App:', p.productName ?? p.name, 'v'+p.version); console.log('✓ License:', p.license);"

  # ── 2. Build Windows distributable ─────────────────────────
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: validate
    defaults:
      run:
        working-directory: ${{ env.APP_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.APP_DIR }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Write a production .env so dotenv in main.js gets the right NODE_ENV
      - name: Write production .env
        shell: bash
        run: |
          echo "NODE_ENV=production" > .env
          echo "OPEN_DEVTOOLS=false" >> .env

      - name: Build distributables
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List dist output
        run: dir dist

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-dist
          path: |
            ${{ env.APP_DIR }}/dist/*.exe
            ${{ env.APP_DIR }}/dist/*.yml
          retention-days: 14

  # ── 3. Create GitHub Release ────────────────────────────────
  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build-windows
    if: ${{ github.event.inputs.dry_run != 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-dist
          path: release-files

      - name: List release files
        run: ls -lh release-files/

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "PacketTime Debugger ${{ steps.version.outputs.VERSION }}"
          body: |
            ## PacketTime Debugger ${{ steps.version.outputs.VERSION }}

            ### Download
            | File | Description |
            |---|---|
            | `PacketTime-Debugger-Setup-*.exe` | Windows installer — installs with Start Menu + Desktop shortcuts |
            | `PacketTime-Debugger-*-portable.exe` | Portable — run without installing |

            ### Installation
            1. Download the installer above
            2. Run it — no Node.js needed, everything is bundled
            3. The app opens maximised automatically

            ---
            _See [README](https://github.com/SumedhWasnik1996/Packet-Time#readme) for full usage guide._
          files: release-files/*.exe
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-rc') }}
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
