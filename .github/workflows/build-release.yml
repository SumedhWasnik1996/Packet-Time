name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build only — skip publishing the GitHub Release'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

env:
  NODE_VERSION: '20'
  APP_DIR: packetTimeApp

jobs:

  # ── Job 1: Run tests before spending money on a Windows build runner ─────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.APP_DIR }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.APP_DIR }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Write test .env
        run: |
          echo "NODE_ENV=test"        > .env
          echo "OPEN_DEVTOOLS=false" >> .env

      - name: Run tests
        run: npm run test:ci
        env:
          NODE_ENV: test

  # ── Job 2: Validate package.json ─────────────────────────────────────────
  validate:
    name: Validate
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Verify package.json
        working-directory: ${{ env.APP_DIR }}
        run: |
          node -e "
            const p = require('./package.json');
            console.log('Name   :', p.name);
            console.log('Version:', p.version);
            console.log('License:', p.license);
            if (!p.version) process.exit(1);
          "

  # ── Job 3: Build Windows .exe ─────────────────────────────────────────────
  build:
    name: Build Windows
    runs-on: windows-latest
    needs: validate
    defaults:
      run:
        working-directory: ${{ env.APP_DIR }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.APP_DIR }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Write production .env
        shell: bash
        run: |
          echo "NODE_ENV=production"  > .env
          echo "OPEN_DEVTOOLS=false" >> .env

      - name: Build distributable
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-dist
          path: ${{ env.APP_DIR }}/dist/*.exe
          retention-days: 14

  # ── Job 4: Publish GitHub Release ────────────────────────────────────────
  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event.inputs.dry_run != 'true' }}

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-dist
          path: release-files

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "PacketTime Debugger ${{ github.ref_name }}"
          body: |
            ## PacketTime Debugger ${{ github.ref_name }}

            ### Download
            | File | Description |
            |---|---|
            | `PacketTime-Debugger-Setup-*.exe` | Installer — recommended |
            | `PacketTime-Debugger-*-portable.exe` | Portable, no install needed |

            > No Node.js required — everything is bundled.
          files: release-files/*.exe
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-rc') }}
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
